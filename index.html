<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaterApp PRO+</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gradient-to-br from-blue-400 to-cyan-400 min-h-screen flex items-center justify-center transition-all duration-300" id="body">

  <div class="bg-white dark:bg-gray-900 w-11/12 max-w-md p-6 rounded-3xl shadow-2xl text-center transition-all duration-300">

    <!-- Top Bar -->
     <div class="mt-3 text-sm text-gray-600 dark:text-gray-400">
  ⏳ Próximo recordatorio en:
  <span id="countdown" class="font-bold">--:--</span>
</div>
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold text-gray-800 dark:text-white">💧 WaterApp</h1>
      <button onclick="toggleDarkMode()" class="text-xl">🌙</button>
    </div>

    <!-- Progress -->
    <div class="w-full bg-gray-200 dark:bg-gray-700 h-4 rounded-full overflow-hidden mb-3">
      <div id="progress-bar" class="h-full bg-cyan-500 transition-all duration-300 w-0"></div>
    </div>

    <p id="status" class="mb-4 text-gray-700 dark:text-gray-300">
      0 ml / 1000 ml
    </p>

    <!-- Buttons -->
    <div class="flex flex-wrap justify-center gap-2 mb-4">
      <button onclick="addWater(100)" class="px-4 py-2 bg-blue-500 text-white rounded-xl shadow hover:opacity-80">+100 ml</button>
      <button onclick="addWater(250)" class="px-4 py-2 bg-blue-500 text-white rounded-xl shadow hover:opacity-80">+250 ml</button>
      <button onclick="addWater(500)" class="px-4 py-2 bg-blue-500 text-white rounded-xl shadow hover:opacity-80">+500 ml</button>
    </div>

    <!-- Settings -->
    <div class="text-sm text-gray-700 dark:text-gray-300 space-y-3">

      <div>
        <label class="block mb-1 font-semibold">Meta diaria</label>
        <select id="goalSelect" onchange="changeGoal()" class="w-full p-2 rounded-xl bg-gray-100 dark:bg-gray-800">
          <option value="1000">1 Litro</option>
          <option value="1500">1.5 Litros</option>
          <option value="2000">2 Litros</option>
        </select>
      </div>

      <div>
        <label class="block mb-1 font-semibold">Recordatorio</label>
        <select id="intervalSelect" onchange="changeInterval()" class="w-full p-2 rounded-xl bg-gray-100 dark:bg-gray-800">
           <option value="10000">10 Segundos</option>
           <option value="60000">1 minuto</option>
            <option value="1800000">30 minutos</option>
          <option value="3600000">1 hora</option>
          <option value="7200000">2 horas</option>
        </select>
      </div>

      <div class="mt-4 space-y-2 text-sm text-gray-700 dark:text-gray-300">

        <div class="flex items-center justify-between">
            <span>🔊 Sonido</span>
            <input type="checkbox" id="soundToggle" onchange="toggleSound()" class="w-5 h-5">
        </div>

        <div class="flex items-center justify-between">
            <span>📳 Vibración</span>
            <input type="checkbox" id="vibrationToggle" onchange="toggleVibration()" class="w-5 h-5">
        </div>

        </div>

    </div>

    <button onclick="resetDay()" class="mt-4 w-full bg-red-500 text-white py-2 rounded-xl hover:opacity-80">
      Reiniciar Día
    </button>

    <!-- History -->
    <div class="mt-6 text-left">
      <h3 class="font-bold mb-2 text-gray-800 dark:text-white">📊 Historial</h3>
      <ul id="history" class="text-sm text-gray-600 dark:text-gray-400 space-y-1"></ul>
    </div>

  </div>

<script src="app.js"></script>
</body>
</html>
